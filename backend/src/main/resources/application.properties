spring.application.name=pulse-backend

# Database — Railway injects DATABASE_URL, fallback to local dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pulsedb}
spring.datasource.username=${PGUSER:pulse}
spring.datasource.password=${PGPASSWORD:pulse}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Groq
groq.api.key=${GROQ_API_KEY:your-key-here}

# Rate limiting
pulse.insights.max-calls-per-day=10

# Server — Railway sets PORT env var
server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health,metrics
