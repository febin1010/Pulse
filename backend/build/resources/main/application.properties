spring.application.name=pulse-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/pulsedb
spring.datasource.username=pulse
spring.datasource.password=pulse
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Groq
groq.api.key=${GROQ_API_KEY:your-key-here}

# Rate limiting (max insight calls per device per day)
pulse.insights.max-calls-per-day=10

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,metrics
